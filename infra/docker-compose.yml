version: '3.9'

x-api-env: &api_env
  environment:
    - WHISPER_MODEL=base
    - WHISPER_DEVICE=cpu
    - WHISPER_COMPUTE=int8
    - DATABASE_URL=postgresql://stt:stt@db:5432/stt
    - REDIS_URL=redis://redis:6379/0
    - OLLAMA_URL=http://ollama:11434
    - OLLAMA_MODEL=llama3.2:1b
    - XTTS_MODEL=tts_models/en/xtts_v2

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - ws_server

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    <<: *api_env
    volumes:
      - ./backend/uploads:/tmp/uploads
      - ./backend/audio:/tmp/audio
    depends_on:
      - db
      - redis
      - ollama
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ws_server:
    build: ./backend
    command: python whisper_live.py --host 0.0.0.0 --port 9090
    <<: *api_env
    ports:
      - "9090:9090"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stt
      POSTGRES_PASSWORD: stt
      POSTGRES_DB: stt
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/entrypoint.sh"]
    environment:
      - PULL_MODEL=true
      - OLLAMA_MODEL=llama3.2:1b
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

volumes:
  pgdata:
  ollama_data: