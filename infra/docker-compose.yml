version: '3.9'

x-api-env: &api_env
  environment:
    - WHISPER_MODEL=medium
    - WHISPER_DEVICE=cpu
    - WHISPER_COMPUTE=int8
    - DATABASE_URL=postgresql://stt:stt@db:5432/stt
    - REDIS_URL=redis://redis:6379/0

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - ws_server

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    <<: *api_env
    volumes:
      - ./backend/uploads:/tmp/uploads
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  ws_server:
    build: ./backend
    command: python whisper_live.py --host 0.0.0.0 --port 9090
    <<: *api_env
    ports:
      - "9090:9090"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stt
      POSTGRES_PASSWORD: stt
      POSTGRES_DB: stt
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata: